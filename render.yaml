# Render blueprint for GAIA — https://render.com/docs/blueprint-spec
# Deploys two services: the Express+Socket.IO API and the Vite frontend as a
# static site pointed at the API.
#
# NOTE: Free tier does not allow persistent disks, so SQLite lives on the
# container's ephemeral filesystem. Data persists while the server runs but is
# reset on redeploy or after the free-tier idle sleep. For durable storage,
# move gaia-server to a paid plan and add a `disk:` block (mountPath /var/data,
# DB_FILE=/var/data/dev.sqlite3), or migrate to Postgres.

services:
  # ---- API server (Express + Socket.IO + SQLite) ----
  - type: web
    name: gaia-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    # Migrate the (ephemeral) SQLite file, then start.
    startCommand: npx knex migrate:latest && npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22.17.0"

  # ---- Frontend (Vite static build) ----
  - type: web
    name: gaia-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "22.17.0"
      # Point the browser at the API service's public URL at build time.
      - key: VITE_API_HOST
        fromService:
          name: gaia-server
          type: web
          property: host
    # SPA: serve index.html for client-side routes.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
